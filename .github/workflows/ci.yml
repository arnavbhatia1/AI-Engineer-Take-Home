name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        # 3.11 mirrors Streamlit Community Cloud's default runtime.
        python-version: ["3.11", "3.12"]

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Byte-compile everything (catches syntax errors)
        run: python -m compileall -q app.py src tests samples

      - name: Unit and integration tests
        # Includes tests/test_samples.py, which runs the full bundled-samples
        # batch end to end (CSV -> images -> concurrent verify -> verdicts).
        run: python -m unittest discover -s tests -v

      - name: App boots (real Streamlit server + health check)
        # Boot the app exactly the way Streamlit Community Cloud does and
        # confirm it comes up healthy and serves the main page.
        run: |
          streamlit run app.py --server.headless true --server.port 8601 \
            --browser.gatherUsageStats false &
          APP_PID=$!

          healthy=0
          for i in $(seq 1 30); do
            if curl -fsS http://localhost:8601/_stcore/health 2>/dev/null | grep -q ok; then
              healthy=1
              break
            fi
            sleep 2
          done

          if [ "$healthy" -ne 1 ]; then
            echo "::error::Streamlit server never became healthy"
            kill "$APP_PID" 2>/dev/null || true
            exit 1
          fi

          curl -fsS -o /dev/null -w "main page: HTTP %{http_code}\n" http://localhost:8601/
          echo "server healthy and serving"
          kill "$APP_PID"
